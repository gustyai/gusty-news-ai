<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#07111f">
  <title>Gusty News AI™</title>
  <style>
    :root{--bg:#07111f;--card:#0d1c31;--blue:#2490ff;--text:#f7fbff;--muted:#9eb1c7}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(155deg,#06101d,#10284a);color:var(--text);min-height:100vh}
    .wrap{max-width:860px;margin:auto;padding:30px 18px 64px}
    .brand{font-weight:900;letter-spacing:.8px;color:#68b7ff}
    .hero{padding:42px 0 24px}
    h1{font-size:clamp(42px,10vw,78px);line-height:.96;margin:14px 0}
    .lead{color:var(--muted);font-size:18px;line-height:1.55}
    .tags{margin-top:18px}
    .tag{display:inline-block;padding:7px 11px;border-radius:999px;background:#16385f;color:#8fc8ff;font-size:13px;margin:4px}
    .card{background:rgba(13,28,49,.94);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:22px;margin-top:22px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
    textarea{width:100%;min-height:130px;background:#071321;color:#fff;border:1px solid #294766;border-radius:14px;padding:14px;font-size:16px;resize:vertical}
    button{width:100%;margin-top:12px;border:0;border-radius:14px;padding:15px;background:var(--blue);color:white;font-weight:900;font-size:16px}
    #resultado{white-space:pre-wrap;color:#dcecff;line-height:1.55;margin-top:18px}
    footer{color:#6f88a3;text-align:center;margin-top:38px;font-size:13px}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand">GUSTY NEWS AI™</div>
    <section class="hero">
      <div class="tags">
        <span class="tag">Japón</span><span class="tag">IA</span><span class="tag">Negocios</span><span class="tag">China</span>
      </div>
      <h1>Noticias con criterio, no con ruido.</h1>
      <p class="lead">Una primera versión funcional para convertir temas y noticias en borradores editoriales con estilo Gusty™.</p>
    </section>
    <section class="card">
      <h2>Generador rápido</h2>
      <textarea id="tema" placeholder="Escribe aquí una noticia o tema…"></textarea>
      <button onclick="generar()">Crear borrador Gusty</button>
      <div id="resultado"></div>
    </section>
    <footer>Gusty News AI™ · MVP v2</footer>
  </main>
  <script>
    function generar(){
      const tema=document.getElementById('tema').value.trim();
      const out=document.getElementById('resultado');
      if(!tema){out.textContent='Escribe primero una noticia o tema.';return;}
      out.textContent='📰 GUSTY NEWS AI™\n\n'+tema+'\n\n¿Por qué importa?\nPorque detrás del titular existe una señal que puede afectar a personas, empresas o mercados.\n\n¿Qué opinas?\n\n— Gusty™';
    }
  </script>
</body>
</html>
